<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-Aware Dispatcher — 3D Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Control Panel (Left Sidebar) -->
        <div id="control-panel">
            <h1>Mission Control</h1>

            <!-- Presets -->
            <section class="panel-section">
                <h2>Presets</h2>
                <select id="preset-select">
                    <option value="sample">Default Sample</option>
                    <option value="stress_low_battery">Stress: Low Battery (40)</option>
                    <option value="stress_heavy_wind">Stress: Heavy Wind (4x)</option>
                    <option value="edge_small_grid">Edge: Small Grid (5x5)</option>
                    <option value="edge_no_wind">Edge: No Wind Penalty</option>
                </select>
                <button id="load-preset-btn" class="btn btn-secondary">Load Preset</button>
            </section>

            <!-- Grid Config -->
            <section class="panel-section">
                <h2>Grid</h2>
                <div class="input-row">
                    <label>Width</label>
                    <input type="number" id="grid-width" value="20" min="3" max="50">
                </div>
                <div class="input-row">
                    <label>Height</label>
                    <input type="number" id="grid-height" value="20" min="3" max="50">
                </div>
                <div class="obstacle-info">
                    <span id="obstacle-count">0</span> obstacles
                    <button id="clear-obstacles-btn" class="btn-small">Clear</button>
                </div>
                <p class="hint">Click grid cells to toggle obstacles</p>
            </section>

            <!-- Simulation Config -->
            <section class="panel-section">
                <h2>Simulation Parameters</h2>
                <div class="input-row">
                    <label>Battery Capacity</label>
                    <input type="range" id="battery-capacity" min="10" max="500" value="100" step="5">
                    <span class="range-val" id="battery-capacity-val">100</span>
                </div>
                <div class="input-row">
                    <label>Base Move Cost</label>
                    <input type="range" id="base-move-cost" min="0.1" max="5" value="1.0" step="0.1">
                    <span class="range-val" id="base-move-cost-val">1.0</span>
                </div>
                <div class="input-row">
                    <label>Wind With (tailwind)</label>
                    <input type="range" id="wind-with" min="0.1" max="2" value="0.5" step="0.05">
                    <span class="range-val" id="wind-with-val">0.5</span>
                </div>
                <div class="input-row">
                    <label>Wind Against (headwind)</label>
                    <input type="range" id="wind-against" min="0.5" max="5" value="2.0" step="0.1">
                    <span class="range-val" id="wind-against-val">2.0</span>
                </div>
                <div class="input-row">
                    <label>Wind Cross</label>
                    <input type="range" id="wind-cross" min="0.1" max="3" value="1.0" step="0.1">
                    <span class="range-val" id="wind-cross-val">1.0</span>
                </div>
                <div class="input-row">
                    <label>Payload Penalty Rate</label>
                    <input type="range" id="payload-rate" min="0" max="0.5" value="0.10" step="0.01">
                    <span class="range-val" id="payload-rate-val">0.10</span>
                </div>
                <div class="input-row">
                    <label>Payload Increment (lbs)</label>
                    <input type="range" id="payload-increment" min="1" max="20" value="5" step="1">
                    <span class="range-val" id="payload-increment-val">5</span>
                </div>
            </section>

            <!-- Packages -->
            <section class="panel-section">
                <h2>Packages</h2>
                <div id="packages-list"></div>
                <button id="add-package-btn" class="btn btn-secondary">+ Add Package</button>
            </section>

            <!-- Weather -->
            <section class="panel-section">
                <h2>Weather Forecast</h2>
                <div id="weather-list"></div>
                <button id="add-weather-btn" class="btn btn-secondary">+ Add Segment</button>
            </section>

            <!-- Run -->
            <section class="panel-section">
                <button id="run-btn" class="btn btn-primary">Execute Mission</button>
                <div id="status-message"></div>
            </section>
        </div>

        <!-- 3D Viewport -->
        <div id="viewport">
            <canvas id="render-canvas"></canvas>

            <!-- HUD Overlay -->
            <div id="hud">
                <div id="hud-top">
                    <div class="hud-item">
                        <span class="hud-label">TICK</span>
                        <span id="hud-tick">0 / 0</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">PACKAGE</span>
                        <span id="hud-package">--</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">PHASE</span>
                        <span id="hud-phase">IDLE</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">WIND</span>
                        <span id="hud-wind">--</span>
                    </div>
                </div>
                <div id="hud-battery">
                    <span class="hud-label">BATTERY</span>
                    <div id="battery-bar-container">
                        <div id="battery-bar-fill"></div>
                    </div>
                    <span id="battery-percentage">100%</span>
                </div>
                <div id="hud-cost">
                    <span class="hud-label">TOTAL COST</span>
                    <span id="hud-total-cost">0.00</span>
                </div>
            </div>

            <!-- Playback Controls -->
            <div id="playback-controls">
                <button id="btn-reset" title="Reset">&#x23EE;</button>
                <button id="btn-step-back" title="Step Back">&#x23EA;</button>
                <button id="btn-play-pause" title="Play/Pause">&#x25B6;</button>
                <button id="btn-step-forward" title="Step Forward">&#x23E9;</button>
                <div class="speed-control">
                    <label>Speed</label>
                    <input type="range" id="playback-speed" min="0.05" max="2" value="0.3" step="0.05">
                    <span id="speed-val">0.3s</span>
                </div>
            </div>

            <!-- Results Panel (shown after simulation) -->
            <div id="results-panel" class="hidden">
                <h3>Mission Summary</h3>
                <div id="results-content"></div>
                <button id="close-results" class="btn-small">Close</button>
            </div>
        </div>
    </div>

    <!-- Three.js from CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
